name: Test and Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        
    - name: Run Backend Tests & Coverage
      run: |
        pytest --cov=backend --cov=app --cov=wellness_env --cov-fail-under=30 tests/
        
    - name: Run Traceability Plugin
      run: |
        pytest --traceability tests/

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Frontend Dependencies
      working-directory: ./webapp
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./webapp
      run: npm run build
      
    - name: Prepare Static Assets for Backend
      run: |
        rm -rf static
        mkdir -p static
        cp -r webapp/out/* static/
      
    - name: Install Playwright Browsers
      working-directory: ./webapp
      run: npx playwright install --with-deps chromium
      
    - name: Run Playwright E2E Tests
      working-directory: ./webapp
      run: npm run test:e2e
      
    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: webapp/playwright-report/
        retention-days: 30
